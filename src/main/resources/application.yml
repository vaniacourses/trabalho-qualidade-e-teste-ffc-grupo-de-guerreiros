spring:
  application:
    name: bancodigital
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bancodigital}
    username: ${DB_USER:bancodigital}
    password: ${DB_PASSWORD:bancodigital}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: BancodigitalHikariPool
      connection-timeout: 10000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  thymeleaf:
    cache: ${THYMELEAF_CACHE:true}
  mvc:
    hiddenmethod:
      filter:
        enabled: true

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    root: INFO
    com.bancodigital: INFO
    org.springframework.jdbc.core: WARN
