<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Digital — Cadastro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="login-container">
    <div class="card">
        <h1>Cadastro</h1>
        <p class="muted">Crie sua conta para começar a usar o Banco Digital.</p>

        <p th:if="${erro}" class="alert error" th:text="${erro}"></p>

        <form th:action="@{/cadastro}" th:object="${cadastroForm}" method="post">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" th:field="*{nome}" required minlength="2">

            <label for="email">E-mail</label>
            <input type="email" id="email" th:field="*{email}" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" th:field="*{senha}" required minlength="8">
            <small class="muted">Mínimo 8 caracteres.</small>

            <button type="submit" class="primary">Cadastrar</button>
        </form>

        <p style="margin-top:1rem;">
            Já tem conta? <a th:href="@{/login}">Entrar</a>.
        </p>
    </div>
</div>

</body>
</html>
