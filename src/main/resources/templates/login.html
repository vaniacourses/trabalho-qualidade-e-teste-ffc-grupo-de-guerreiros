<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Digital — Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="login-container">
    <div class="card">
        <h1>Banco Digital</h1>
        <p class="muted">Acesse sua conta para continuar.</p>

        <p th:if="${message}" class="alert success" th:text="${message}"></p>
        <p th:if="${error}"   class="alert error"   th:text="${error}"></p>

        <form th:action="@{/login}" method="post">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required autofocus>

            <label for="password">Senha</label>
            <input type="password" id="password" name="password" required>

            <button type="submit" class="primary">Entrar</button>
        </form>

        <p style="margin-top:1rem;">
            Não tem uma conta? <a th:href="@{/signup}">Cadastre-se</a>.
        </p>
    </div>
</div>

</body>
</html>
