<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Digital — Transferência</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: topbar}"></div>

<div class="container">
    <div th:replace="~{fragments/layout :: alertas}"></div>

    <div class="card">
        <h1>Transferência</h1>
        <p class="muted">Conta de origem <strong th:text="${account.number}">C00000</strong></p>
        <p>Saldo atual: <strong th:text="${#numbers.formatCurrency(account.balance)}">R$ 0,00</strong></p>

        <form th:action="@{/transfer}" method="post">
            <label for="destination">Conta destino</label>
            <input type="text" id="destination" name="destination" placeholder="C00000" required>

            <label for="amount">Valor</label>
            <input type="number" id="amount" name="amount" min="0.01" step="0.01" required>

            <button type="submit" class="primary">Transferir</button>
        </form>
    </div>
</div>

</body>
</html>
