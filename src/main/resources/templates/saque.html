<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Digital — Saque</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: topbar}"></div>

<div class="container">
    <div th:replace="~{fragments/layout :: alertas}"></div>

    <div class="card">
        <h1>Saque</h1>
        <p class="muted">Conta <strong th:text="${conta.number}">C00000</strong></p>
        <p>Saldo atual: <strong th:text="${#numbers.formatCurrency(conta.balance)}">R$ 0,00</strong></p>

        <form th:action="@{/saque}" method="post">
            <label for="valor">Valor do saque</label>
            <input type="number" id="valor" name="valor" min="0.01" step="0.01" required>
            <small class="muted">Limite máximo por saque: R$ 10.000,00</small>

            <button type="submit" class="primary">Sacar</button>
        </form>
    </div>
</div>

</body>
</html>
