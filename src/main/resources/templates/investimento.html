<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco Digital — Investimento</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: topbar}"></div>

<div class="container">
    <div th:replace="~{fragments/layout :: alertas}"></div>

    <div class="card">
        <h1>Investimento</h1>
        <p>Valor investido (com juros aplicados):</p>
        <p class="saldo-destaque" th:text="${#numbers.formatCurrency(valorAtual)}">R$ 0,00</p>
        <p class="muted">Rendimento de 1% ao minuto sobre o valor investido.</p>

        <form th:action="@{/investimento}" method="post">
            <label for="op">Operação</label>
            <select id="op" name="op" required>
                <option value="investir">Investir</option>
                <option value="retirar">Resgatar</option>
            </select>

            <label for="valor">Valor</label>
            <input type="number" id="valor" name="valor" min="0.01" step="0.01" required>

            <button type="submit" class="primary">Confirmar</button>
        </form>
    </div>
</div>

</body>
</html>
