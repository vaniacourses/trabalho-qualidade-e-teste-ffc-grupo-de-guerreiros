services:
  sonarqube:
    # A edicao Community atende ao trabalho porque gera dashboard, issues,
    # metricas de complexidade e integracao com o relatorio JaCoCo.
    image: sonarqube:10.6-community
    container_name: bancodigital-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      # A verificacao de bootstrap do Elasticsearch e desabilitada somente no
      # ambiente academico local para evitar ajustes no kernel da maquina.
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      # Volumes nomeados preservam projetos, tokens e historico entre reinicios.
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
