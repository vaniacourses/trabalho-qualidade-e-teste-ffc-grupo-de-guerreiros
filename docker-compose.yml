services:
  postgres:
    image: postgres:16-alpine
    container_name: bancodigital-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bancodigital}
      POSTGRES_USER: ${POSTGRES_USER:-bancodigital}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bancodigital}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bancodigital} -d ${POSTGRES_DB:-bancodigital}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bancodigital-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bancodigital}
      DB_USER: ${POSTGRES_USER:-bancodigital}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-bancodigital}
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"

  adminer:
    image: adminer:latest
    container_name: bancodigital-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha

volumes:
  pgdata:
    name: bancodigital-pgdata
